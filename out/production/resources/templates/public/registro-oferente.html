<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org" lang="es">
<head><title>Registro Oferente</title></head>
<body>
    <div layout:fragment="content">
        <div class="container" style="max-width: 600px; margin: 2rem auto;">
            <div th:if="${error}" style="background: #fef2f2; color: #dc2626; padding: 1rem; border-radius: 6px; margin-bottom: 1rem;">
                <span th:text="${error}"></span>
            </div>

            <div class="card" style="padding: 2rem;">
                <h2 style="text-align: center; margin-bottom: 1.5rem;">Registro de Oferente</h2>
                <form method="post" action="/registro/oferente">
                    <div class="form-group">
                        <label class="form-label">Cedula o Identificacion *</label>
                        <input type="text" name="identificacion" class="form-control" required placeholder="123456789" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nombre *</label>
                        <input type="text" name="nombre" class="form-control" required placeholder="Tu nombre" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Primer Apellido *</label>
                        <input type="text" name="apellido" class="form-control" required placeholder="Tu apellido" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nacionalidad</label>
                        <input type="text" name="nacionalidad" class="form-control" placeholder="Costarricense" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Telefono</label>
                        <input type="tel" name="telefono" class="form-control" placeholder="+506 8888-9999" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Correo Electronico *</label>
                        <input type="email" name="correo" class="form-control" required placeholder="tu@email.com" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Lugar de Residencia</label>
                        <input type="text" name="residencia" class="form-control" placeholder="San Jose" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Contrasena *</label>
                        <input type="password" name="password" class="form-control" required placeholder="Minimo 6 caracteres" />
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Registrar Oferente</button>
                </form>
                <p style="text-align: center; margin-top: 1rem;">Ya tienes cuenta? <a href="/login">Inicia sesion</a></p>
            </div>
        </div>
    </div>
</body>
</html>
