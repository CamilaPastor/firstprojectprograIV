<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org" lang="es">
<head><title>Inicio</title></head>
<body>
    <div layout:fragment="content">
        <div class="container" style="padding: 2rem 0;">
            <h1>Bolsa de Empleo</h1>
            <p>Ultimos 5 puestos publicos.</p>

            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 1.5rem;">
                <div th:each="puesto : ${puestos}" class="card" style="padding: 1.5rem; position: relative;">
                    <p style="margin: 0; font-weight: bold;" th:text="${puesto.empresa.nombre}">Empresa</p>
                    <h3 style="margin: 0.3rem 0;" th:text="${puesto.descripcion}">Puesto</h3>
                    <p style="color: #16a34a; font-weight: bold;">
                        &#8353; <span th:text="${puesto.salario != null ? #numbers.formatDecimal(puesto.salario, 0, 'COMMA', 2, 'POINT') : 'N/A'}"></span>
                    </p>

                    <!-- Tooltip con detalles al hover - solo CSS -->
                    <details style="margin-top: 0.5rem;">
                        <summary class="btn btn-secondary" style="cursor: pointer; display: inline-block;">Ver detalle</summary>
                        <div style="background: #f0fdf4; padding: 1rem; border-radius: 6px; margin-top: 0.5rem;">
                            <strong th:text="${puesto.descripcion}">Puesto</strong>
                            <ul style="padding-left: 1.2rem; margin-top: 0.5rem;">
                                <li th:each="pc : ${puesto.caracteristicasRequeridas}"
                                    th:text="${pc.caracteristica.nombre + ' (nivel ' + pc.nivelRequerido + ')'}">Caracteristica</li>
                            </ul>
                            <p th:if="${puesto.caracteristicasRequeridas == null || puesto.caracteristicasRequeridas.isEmpty()}">Sin requisitos especificos.</p>
                        </div>
                    </details>
                </div>
            </div>

            <div th:if="${puestos == null || puestos.isEmpty()}" style="text-align: center; padding: 2rem;">
                <p>No hay puestos disponibles en este momento.</p>
            </div>
        </div>
    </div>
</body>
</html>
