<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org" lang="es">
<head><title>Oferente - Mi CV</title></head>
<body>
    <div layout:fragment="content">
        <div class="container" style="padding: 2rem 0; max-width: 600px; margin: 0 auto;">
            <div th:if="${success}" style="background: #f0fdf4; color: #16a34a; padding: 1rem; border-radius: 6px; margin-bottom: 1rem;">
                <span th:text="${success}"></span>
            </div>
            <div th:if="${error}" style="background: #fef2f2; color: #dc2626; padding: 1rem; border-radius: 6px; margin-bottom: 1rem;">
                <span th:text="${error}"></span>
            </div>

            <h1>Mi CV</h1>

            <div th:if="${tieneCv}" class="card" style="padding: 1.5rem; margin-bottom: 1.5rem;">
                <p>Ya tienes un CV subido: <strong th:text="${cv.nombreArchivo}"></strong></p>
                <p>Fecha de subida: <span th:text="${cv.fechaSubida}"></span></p>
                <a th:href="@{'/oferente/descargar-cv/' + ${usuario.id}}" class="btn btn-primary">Descargar CV</a>
            </div>

            <div th:unless="${tieneCv}" style="padding: 1rem; color: #6b7280; margin-bottom: 1rem;">
                <p>Aun no has subido tu CV.</p>
            </div>

            <div class="card" style="padding: 1.5rem;">
                <h3 th:text="${tieneCv ? 'Actualizar CV' : 'Subir CV'}"></h3>
                <form method="post" action="/oferente/subir-cv" enctype="multipart/form-data">
                    <div class="form-group">
                        <label class="form-label">Archivo PDF *</label>
                        <input type="file" name="archivo" class="form-control" accept="application/pdf" required />
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Subir CV</button>
                </form>
            </div>

            <a href="/oferente/dashboard" class="btn btn-secondary" style="margin-top: 1rem;">Volver al dashboard</a>
        </div>
    </div>
</body>
</html>
