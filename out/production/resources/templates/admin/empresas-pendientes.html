<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org" lang="es">
<head><title>Admin - Empresas pendientes</title></head>
<body>
    <div layout:fragment="content">
        <div class="container" style="padding: 2rem 0;">
            <div th:if="${success}" style="background: #f0fdf4; color: #16a34a; padding: 1rem; border-radius: 6px; margin-bottom: 1rem;">
                <span th:text="${success}"></span>
            </div>
            <div th:if="${error}" style="background: #fef2f2; color: #dc2626; padding: 1rem; border-radius: 6px; margin-bottom: 1rem;">
                <span th:text="${error}"></span>
            </div>

            <h1>Empresas pendientes</h1>

            <table style="width: 100%; border-collapse: collapse; margin-top: 1rem;">
                <thead>
                    <tr style="background: #f3f4f6; text-align: left;">
                        <th style="padding: 0.75rem; border-bottom: 2px solid #e5e7eb;">Usuario</th>
                        <th style="padding: 0.75rem; border-bottom: 2px solid #e5e7eb;">Accion</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="empresa : ${empresas}" style="border-bottom: 1px solid #e5e7eb;">
                        <td style="padding: 0.75rem;" th:text="${empresa.correo}"></td>
                        <td style="padding: 0.75rem;">
                            <form method="post" action="/admin/aprobar-empresa" style="display: inline;">
                                <input type="hidden" name="idEmpresa" th:value="${empresa.idEmpresa}" />
                                <button type="submit" class="btn btn-primary" style="font-size: 0.85rem; padding: 0.3rem 0.6rem;">Aprobar y generar clave</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div th:if="${empresas == null || empresas.isEmpty()}" style="padding: 2rem; text-align: center;">
                <p>No hay empresas pendientes.</p>
            </div>
        </div>
    </div>
</body>
</html>
