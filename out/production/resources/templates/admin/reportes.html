<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org" lang="es">
<head><title>Admin - Reportes</title></head>
<body>
    <div layout:fragment="content">
        <div class="container" style="padding: 2rem 0; max-width: 500px; margin: 0 auto;">
            <h1>Reportes</h1>
            <p>Genera reportes PDF de puestos solicitados por mes.</p>

            <div class="card" style="padding: 2rem;">
                <h3>Generar reporte mensual</h3>
                <form method="get" action="/admin/generar-reporte">
                    <div class="form-group">
                        <label class="form-label">Anio</label>
                        <input type="number" name="anio" class="form-control" required value="2026" min="2020" max="2030" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Mes</label>
                        <select name="mes" class="form-control" required>
                            <option value="1">Enero</option>
                            <option value="2">Febrero</option>
                            <option value="3" selected>Marzo</option>
                            <option value="4">Abril</option>
                            <option value="5">Mayo</option>
                            <option value="6">Junio</option>
                            <option value="7">Julio</option>
                            <option value="8">Agosto</option>
                            <option value="9">Septiembre</option>
                            <option value="10">Octubre</option>
                            <option value="11">Noviembre</option>
                            <option value="12">Diciembre</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Generar PDF</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
