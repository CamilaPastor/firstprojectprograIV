<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org" lang="es">
<head><title>Publicar puesto</title></head>
<body>
    <div layout:fragment="content">
        <div class="container" style="max-width: 700px; margin: 2rem auto;">
            <div th:if="${error}" style="background: #fef2f2; color: #dc2626; padding: 1rem; border-radius: 6px; margin-bottom: 1rem;">
                <span th:text="${error}"></span>
            </div>

            <div class="card" style="padding: 2rem;">
                <h2>Publicar nuevo puesto</h2>
                <form method="post" action="/empresa/nuevo-puesto">
                    <div class="form-group">
                        <label class="form-label">Descripcion del puesto *</label>
                        <textarea name="descripcion" class="form-control" rows="3" required placeholder="Ej: Desarrollador Java Sr."></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Salario ofrecido</label>
                        <input type="number" name="salario" class="form-control" step="0.01" placeholder="Ej: 1500000" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tipo de publicacion</label>
                        <select name="tipoPublicacion" class="form-control">
                            <option value="publico">Publico</option>
                            <option value="privado">Privado</option>
                        </select>
                    </div>

                    <h3 style="margin-top: 1.5rem;">Caracteristicas requeridas</h3>
                    <p style="color: #6b7280; font-size: 0.9rem;">Selecciona las caracteristicas y su nivel requerido (1-5).</p>

                    <div th:each="categoria : ${categorias}" style="margin-bottom: 1rem;">
                        <strong th:text="${categoria.nombre}"></strong>
                        <div th:if="${categoria.hijos != null && !categoria.hijos.isEmpty()}" style="padding-left: 1rem; margin-top: 0.3rem;">
                            <div th:each="sub : ${categoria.hijos}" style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.3rem;">
                                <input type="checkbox" name="caracteristicas" th:value="${sub.idCaracteristica}" />
                                <span th:text="${sub.nombre}" style="min-width: 120px;"></span>
                                <label style="font-size: 0.85rem;">Nivel:</label>
                                <select th:name="'nivel_' + ${sub.idCaracteristica}" class="form-control" style="width: 60px; padding: 0.2rem;">
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3" selected>3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Publicar puesto</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
