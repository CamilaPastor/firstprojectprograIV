services:

  postgres:
    image: postgres:16-alpine
    container_name: bolsa_empleo_postgres
    restart: always
    environment:
      POSTGRES_DB: bolsa_empleo
      POSTGRES_USER: bolsa_user
      POSTGRES_PASSWORD: bolsa1234
      TZ: America/Costa_Rica
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./BolsaEmpleo.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolsa_user -d bolsa_empleo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - bolsa_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bolsa_empleo_app
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bolsa_empleo
      SPRING_DATASOURCE_USERNAME: bolsa_user
      SPRING_DATASOURCE_PASSWORD: bolsa1234
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_APPLICATION_NAME: bolsa-empleo
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: "8080"
      JAVA_OPTS: "-Xmx512m -Xms256m"
      TZ: America/Costa_Rica
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - bolsa_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
    driver: local

networks:
  bolsa_network:
    driver: bridge
