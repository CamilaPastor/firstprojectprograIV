<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${puesto.titulo} + ' - Detalles'"></title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <a href="/puesto/lista" class="btn btn-secondary">Volver</a>
        
        <div class="job-details">
            <h2 th:text="${puesto.titulo}"></h2>
            <p class="company" th:text="${puesto.empresa.nombre}"></p>
            
            <div class="job-meta">
                <span th:text="${puesto.ciudad} + ', ' + ${puesto.estado}"></span>
                <span th:text="${puesto.tipoContrato}"></span>
                <span th:if="${puesto.salarioMinimo != null}" 
                      th:text="${puesto.salarioMinimo} + ' - ' + ${puesto.salarioMaximo} + ' ' + ${puesto.moneda}"></span>
            </div>
            
            <h3>Descripción</h3>
            <div class="description" th:text="${puesto.descripcion}"></div>
            
            <h3>Requisitos</h3>
            <div class="requirements" th:text="${puesto.requisitos}"></div>
            
            <div class="details-info">
                <p th:text="'Nivel de Educación: ' + ${puesto.nivelEducacion}"></p>
                <p th:text="'Experiencia Requerida: ' + ${puesto.experienciaRequerida}"></p>
                <p th:text="'Publicado: ' + ${#dates.format(puesto.fechaPublicacion, 'dd/MM/yyyy')}"></p>
            </div>
            
            <h3>Habilidades Requeridas</h3>
            <div th:if="${puesto.caracteristicas.size() > 0}" class="characteristics">
                <ul>
                    <li th:each="car : ${puesto.caracteristicas}">
                        <strong th:text="${car.nombre}"></strong> 
                        (<span th:text="${car.nivel}"></span>)
                        <span th:if="${car.descripcion}" th:text="${car.descripcion}"></span>
                    </li>
                </ul>
            </div>
            
            <div class="action-buttons">
                <a href="/oferente/registro" class="btn btn-primary">Aplicar Ahora</a>
                <a th:href="@{/puesto/lista}" class="btn btn-secondary">Ver Más Empleos</a>
            </div>
        </div>
    </div>
</body>
</html>
