<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Crear Puesto</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container form-container">
        <div class="form-box">
            <h2>Crear Nuevo Puesto</h2>
            <p th:text="'Empresa: ' + ${empresa.nombre}"></p>
            
            <form th:action="@{/puesto/crear}" th:object="${puesto}" method="post" class="form">
                <input type="hidden" name="empresaId" th:value="${empresa.empresaId}">
                
                <div class="form-group">
                    <label for="titulo">Título del Puesto</label>
                    <input type="text" id="titulo" th:field="*{titulo}" required>
                </div>
                
                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" th:field="*{descripcion}" rows="6" required></textarea>
                </div>
                
                <div class="form-group">
                    <label for="requisitos">Requisitos</label>
                    <textarea id="requisitos" th:field="*{requisitos}" rows="4"></textarea>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="salarioMinimo">Salario Mínimo</label>
                        <input type="number" id="salarioMinimo" th:field="*{salarioMinimo}" step="0.01">
                    </div>
                    <div class="form-group">
                        <label for="salarioMaximo">Salario Máximo</label>
                        <input type="number" id="salarioMaximo" th:field="*{salarioMaximo}" step="0.01">
                    </div>
                    <div class="form-group">
                        <label for="moneda">Moneda</label>
                        <input type="text" id="moneda" th:field="*{moneda}" placeholder="MXN">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="tipoContrato">Tipo de Contrato</label>
                    <select id="tipoContrato" th:field="*{tipoContrato}">
                        <option value="">Seleccionar...</option>
                        <option value="Tiempo Completo">Tiempo Completo</option>
                        <option value="Tiempo Parcial">Tiempo Parcial</option>
                        <option value="Contrato">Contrato</option>
                        <option value="Freelance">Freelance</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="experienciaRequerida">Experiencia Requerida</label>
                    <input type="text" id="experienciaRequerida" th:field="*{experienciaRequerida}" placeholder="ej. 2-3 años">
                </div>
                
                <div class="form-group">
                    <label for="nivelEducacion">Nivel de Educación</label>
                    <input type="text" id="nivelEducacion" th:field="*{nivelEducacion}" placeholder="ej. Licenciatura">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="ciudad">Ciudad</label>
                        <input type="text" id="ciudad" th:field="*{ciudad}" required>
                    </div>
                    <div class="form-group">
                        <label for="estado">Estado</label>
                        <input type="text" id="estado" th:field="*{estado}">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary">Crear Puesto</button>
                <a th:href="@{/empresa/dashboard(id=${empresa.empresaId})}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</body>
</html>
