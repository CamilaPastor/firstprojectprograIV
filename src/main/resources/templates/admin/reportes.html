<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.thymeleaf.org" lang="es">
<head>
    <title>Reportes - Bolsa de Empleo</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container" style="max-width: 600px;">
            <h1>Generar Reportes</h1>
            <p>Descarga reportes mensuales en formato PDF.</p>

            <div class="card" style="padding: 2rem;">
                <h3>Reporte Mensual de Puestos</h3>
                <p style="color: #6B7280; margin-bottom: 1.5rem;">
                    Genera un reporte PDF con todos los puestos publicados en un mes específico.
                </p>

                <form method="get" action="/admin/generar-reporte">
                    <div class="form-group">
                        <label class="form-label">Año *</label>
                        <select name="anio" class="form-control" required>
                            <option value="">Selecciona año</option>
                            <option value="2026" selected>2026</option>
                            <option value="2025">2025</option>
                            <option value="2024">2024</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Mes *</label>
                        <select name="mes" class="form-control" required>
                            <option value="">Selecciona mes</option>
                            <option value="1">Enero</option>
                            <option value="2">Febrero</option>
                            <option value="3">Marzo</option>
                            <option value="4">Abril</option>
                            <option value="5">Mayo</option>
                            <option value="6">Junio</option>
                            <option value="7">Julio</option>
                            <option value="8">Agosto</option>
                            <option value="9">Septiembre</option>
                            <option value="10">Octubre</option>
                            <option value="11">Noviembre</option>
                            <option value="12">Diciembre</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">Descargar Reporte PDF</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
