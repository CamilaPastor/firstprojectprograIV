<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.thymeleaf.org" lang="es">
<head><title>Reportes</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header">
        <h1>&#128196; Generación de Reportes</h1>
        <p>Genere un reporte PDF con los puestos registrados en un mes determinado.</p>
    </div>
    <div class="reportes-wrap">
        <div class="card">
            <div class="card-header">Parámetros del reporte</div>
            <div class="card-body">
                <form method="get" action="/admin/generar-reporte">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Mes</label>
                            <input type="number" name="mes" class="form-control" min="1" max="12" value="1" required/>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Año</label>
                            <input type="number" name="anio" class="form-control" min="2020" max="2099" value="2026" required/>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">&#128196; Generar PDF</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
