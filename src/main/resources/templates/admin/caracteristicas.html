<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.thymeleaf.org" lang="es">
<head><title>Características</title></head>
<body>
<div layout:fragment="content">
    <div class="car-layout">

        
        <div class="car-list">
            <h1>&#128218; Características</h1>

            
            <div class="ruta-chips" style="margin-bottom:8px;">
                <span class="ruta-top" style="margin-right:4px;">Ruta:</span>
                <a href="/admin/caracteristicas" class="chip-a">Raíces</a>
                <th:block th:if="${categoriaActual != null}">
                    <span class="ruta-sep">/</span>
                    <span class="chip" th:text="${categoriaActual.nombre}"></span>
                </th:block>
            </div>

            <p class="sub-title" th:if="${categoriaActual != null}"
               th:text="'Subcategorías de: ' + ${categoriaActual.nombre}"></p>
            <p class="sub-title" th:unless="${categoriaActual != null}">Categorías raíces</p>

            
            <div th:if="${categorias != null}" th:each="cat : ${categorias}" class="nav-row">
                <span th:text="${cat.nombre}">Nombre</span>
                <div class="td-actions">
                    <a th:href="@{'/admin/caracteristicas?actualId=' + ${cat.idCaracteristica}}"
                       class="btn btn-sm btn-primary">Entrar</a>
                    <form method="post" action="/admin/eliminar-caracteristica" style="display:inline;"
                          th:if="${cat.activo}">
                        <input type="hidden" name="idCaracteristica" th:value="${cat.idCaracteristica}"/>
                        <button type="submit" class="btn btn-sm btn-danger">Eliminar</button>
                    </form>
                </div>
            </div>
            <p th:if="${categorias == null or #lists.isEmpty(categorias)}"
               style="color:#6c757d;font-size:13px;">Sin subcategorías.</p>
        </div>

        
        <div class="car-agregar">
            <h3>Agregar Característica</h3>
            <form method="post" action="/admin/crear-caracteristica">
                <div class="form-group">
                    <label class="form-label">Nombre</label>
                    <input type="text" name="nombre" class="form-control" required placeholder="Nombre"/>
                </div>
                <div class="form-group">
                    <label class="form-label">Padre</label>
                    <select name="idPadre" class="form-select">
                        <option value="">(sin padre)</option>
                        <option th:each="car : ${todas}"
                                th:value="${car.idCaracteristica}"
                                th:text="${car.nombre}"
                                th:selected="${categoriaActual != null and car.idCaracteristica == categoriaActual.idCaracteristica}">
                        </option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Crear</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
