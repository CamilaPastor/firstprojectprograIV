<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.thymeleaf.org" lang="es">
<head><title>Empresas Pendientes</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header">
        <h1>&#127970; Empresas pendientes de aprobación</h1>
        <p>Revise y apruebe las solicitudes de registro de empresas.</p>
    </div>

    <div class="table-wrap" th:if="${empresas != null and not #lists.isEmpty(empresas)}">
        <table>
            <thead>
                <tr>
                    <th>Empresa</th>
                    <th>Correo</th>
                    <th>Localización</th>
                    <th>Teléfono</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="empresa : ${empresas}">
                    <td th:text="${empresa.nombre}">—</td>
                    <td th:text="${empresa.correo}">—</td>
                    <td th:text="${empresa.localizacion}">—</td>
                    <td th:text="${empresa.telefono}">—</td>
                    <td>
                        <form method="post" action="/admin/aprobar-empresa" style="display:inline;">
                            <input type="hidden" name="idEmpresa" th:value="${empresa.idEmpresa}"/>
                            <button type="submit" class="btn btn-success btn-sm">&#10003; Aprobar</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <p th:if="${empresas == null or #lists.isEmpty(empresas)}"
       style="font-size:13px;color:#6c757d;padding:18px;background:#fff;border:1px solid #c8d0da;border-radius:4px;">
        No hay empresas pendientes de aprobación.
    </p>
</div>
</body>
</html>
