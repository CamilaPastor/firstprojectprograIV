<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.thymeleaf.org" lang="es">
<head><title>Panel de Administrador</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header">
        <h1>&#9881; Panel de Administración</h1>
        <p>Gestione empresas, oferentes, características y reportes del sistema.</p>
    </div>
    <div class="stat-grid">
        <div class="stat-box">
            <div class="stat-num" th:text="${empresasPendientes != null ? empresasPendientes : 0}">0</div>
            <div class="stat-label">Empresas pendientes</div>
        </div>
        <div class="stat-box">
            <div class="stat-num" th:text="${oferentesPendientes != null ? oferentesPendientes : 0}">0</div>
            <div class="stat-label">Oferentes pendientes</div>
        </div>
        <div class="stat-box">
            <div class="stat-num" th:text="${totalCaracteristicas != null ? totalCaracteristicas : 0}">0</div>
            <div class="stat-label">Características registradas</div>
        </div>
    </div>
    <div class="dash-actions">
        <a href="/admin/empresas-pendientes" class="btn btn-primary">Empresas pendientes</a>
        <a href="/admin/oferentes-pendientes" class="btn btn-primary">Oferentes pendientes</a>
        <a href="/admin/caracteristicas" class="btn btn-outline">Gestionar características</a>
        <a href="/admin/reportes" class="btn btn-outline">Generar reporte</a>
    </div>
</div>
</body>
</html>
