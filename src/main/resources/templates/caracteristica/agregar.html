<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Agregar Característica a Puesto</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container form-container">
        <div class="form-box">
            <h2>Agregar Característica Requerida</h2>
            <p th:text="'Puesto: ' + ${puesto.titulo}"></p>
            
            <form th:action="@{/caracteristica/agregar-puesto/{id}(id=${puesto.puestoId})}" 
                  th:object="${caracteristica}" method="post" class="form">
                
                <div class="form-group">
                    <label for="nombre">Habilidad o Característica</label>
                    <input type="text" id="nombre" th:field="*{nombre}" placeholder="ej. Java, SQL, Leadership" required>
                </div>
                
                <div class="form-group">
                    <label for="tipo">Tipo</label>
                    <select id="tipo" th:field="*{tipo}">
                        <option value="">Seleccionar...</option>
                        <option value="Técnica">Técnica</option>
                        <option value="Idioma">Idioma</option>
                        <option value="Herramienta">Herramienta</option>
                        <option value="Soft Skill">Soft Skill</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="nivel">Nivel Requerido</label>
                    <select id="nivel" th:field="*{nivel}">
                        <option value="">Seleccionar...</option>
                        <option value="Básico">Básico</option>
                        <option value="Intermedio">Intermedio</option>
                        <option value="Avanzado">Avanzado</option>
                        <option value="Experto">Experto</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="descripcion">Descripción de Requisito (Opcional)</label>
                    <textarea id="descripcion" th:field="*{descripcion}" rows="3"></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary">Agregar Característica</button>
                <a th:href="@{/puesto/detalle/{id}(id=${puesto.puestoId})}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</body>
</html>
