<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="error-page">
    <div class="error-code" th:text="${status != null ? status : 'Error'}"></div>
    <div class="error-msg" th:text="${error != null ? error : 'Algo salió mal'}"></div>
    <div class="error-sub">Por favor, intenta de nuevo más tarde.</div>
    <a href="/" class="btn btn-primary" style="margin-top:20px;">Volver al inicio</a>
</div>
</body>
</html>
