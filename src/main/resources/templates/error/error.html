<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Bolsa de Empleo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
        }
        .error-code {
            font-size: 4rem;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        .error-message {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 2rem;
        }
        .error-description {
            color: #666;
            margin-bottom: 2rem;
            max-width: 500px;
        }
        .back-link {
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <nav>
        <div class="navbar">
            <div class="navbar-brand">
                <a th:href="@{/}">Bolsa de Empleo</a>
            </div>
            <ul class="navbar-menu">
                <li><a th:href="@{/}">Inicio</a></li>
                <li><a th:href="@{/about}">Acerca de</a></li>
                <li><a th:href="@{/contact}">Contacto</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <section class="error-container">
            <div class="error-code" th:text="${status}">500</div>
            <h1 class="error-message" th:text="${error ?: 'Error'}">Error del Servidor</h1>
            <p class="error-description">
                Lo sentimos, ha ocurrido un error. Por favor, intente nuevamente más tarde.
            </p>
            <a th:href="@{/}" class="btn btn-primary">Volver al Inicio</a>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Bolsa de Empleo. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
