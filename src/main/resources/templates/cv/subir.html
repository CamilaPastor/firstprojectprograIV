<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Subir CV</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container form-container">
        <div class="form-box">
            <h2>Subir Currículum Vitae</h2>
            
            <div th:if="${error}" class="error-message" th:text="${error}"></div>
            
            <form th:action="@{/cv/subir/{id}(id=${oferenteId})}" method="post" enctype="multipart/form-data" class="form">
                <div class="form-group">
                    <label for="archivo">Seleccionar Archivo</label>
                    <input type="file" id="archivo" name="archivo" accept=".pdf,.doc,.docx" required>
                    <small>Formatos aceptados: PDF, DOC, DOCX (Máximo 10 MB)</small>
                </div>
                
                <button type="submit" class="btn btn-primary">Subir CV</button>
                <a th:href="@{/oferente/perfil(id=${oferenteId})}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</body>
</html>
