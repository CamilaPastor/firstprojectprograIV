<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.thymeleaf.org" lang="es">
<head><title>Mi CV</title></head>
<body>
<div layout:fragment="content">
    <div class="cv-wrap">
        <div class="page-header">
            <h1>&#128196; Mi Curriculum Vitae</h1>
            <p>Suba su CV en formato PDF para que las empresas puedan acceder a él.</p>
        </div>

        
        <div class="cv-info-box" th:if="${tieneCv}">
            <p><strong>Archivo actual:</strong> <span th:text="${cv.nombreArchivo}"></span></p>
            <p><strong>Última actualización:</strong>
               <span th:text="${#temporals.format(cv.fechaActualizacion, 'dd/MM/yyyy HH:mm')}"></span>
            </p>
            <a th:href="@{'/oferente/descargar-cv/' + ${usuario.id}}" class="btn btn-primary">
                &#8659; Descargar CV
            </a>
        </div>
        <p th:unless="${tieneCv}"
           style="font-size:13px;color:#6c757d;padding:14px;background:#fff;border:1px solid #c8d0da;border-radius:4px;margin-bottom:16px;">
            Aún no ha subido ningún CV. Utilice el formulario a continuación para subir su archivo.
        </p>

        
        <div class="card" style="margin-top:14px;">
            <div class="card-header" th:text="${tieneCv ? 'Actualizar CV' : 'Subir CV'}">Subir CV</div>
            <div class="card-body">
                <form method="post" action="/oferente/subir-cv" enctype="multipart/form-data">
                    <div class="form-group">
                        <label class="form-label">Seleccionar archivo PDF</label>
                        <input type="file" name="archivo" class="form-control" accept=".pdf" required/>
                    </div>
                    <button type="submit" class="btn btn-primary" th:text="${tieneCv ? 'Actualizar CV' : 'Subir CV'}">
                        Subir
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
