<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login Candidato</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container form-container">
        <div class="form-box">
            <h2>Login Candidato</h2>
            
            <div th:if="${param.success}" class="success-message">Registro exitoso. Por favor inicia sesión.</div>
            <div th:if="${error}" class="error-message" th:text="${error}"></div>
            
            <form action="/oferente/login" method="post" class="form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="btn btn-primary">Iniciar Sesión</button>
                <p class="form-link">¿No tienes cuenta? <a href="/oferente/registro">Regístrate aquí</a></p>
            </form>
        </div>
    </div>
</body>
</html>
