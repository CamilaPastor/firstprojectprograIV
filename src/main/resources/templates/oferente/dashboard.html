<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org" lang="es">
<head><title>Oferente - Dashboard</title></head>
<body>
    <div layout:fragment="content">
        <div class="container">
            <div class="page-header">
                <h1>&#128100; Panel de Oferente</h1>
                <p>Gestiona tu perfil profesional, habilidades y CV</p>
            </div>

            <div class="stats-grid">
                <a href="/oferente/habilidades" class="stat-card" style="text-decoration: none;">
                    <div class="stat-icon">&#127919;</div>
                    <div class="stat-label">Mis habilidades</div>
                    <p class="text-small text-muted mt-1">Registra y administra tus competencias</p>
                </a>
                <a href="/oferente/mi-cv" class="stat-card" style="text-decoration: none;">
                    <div class="stat-icon">&#128196;</div>
                    <div class="stat-label">Mi CV</div>
                    <p class="text-small text-muted mt-1">Sube o actualiza tu curriculum</p>
                </a>
                <a href="/puestos/buscar-por-caracteristicas" class="stat-card" style="text-decoration: none;">
                    <div class="stat-icon">&#128269;</div>
                    <div class="stat-label">Buscar puestos</div>
                    <p class="text-small text-muted mt-1">Explora oportunidades disponibles</p>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
