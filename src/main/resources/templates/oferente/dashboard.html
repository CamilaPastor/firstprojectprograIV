<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.thymeleaf.org" lang="es">
<head><title>Panel de Oferente</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header">
        <h1>&#128100; Panel de Oferente</h1>
        <p th:text="${usuario != null ? 'Bienvenido, ' + usuario.nombre : 'Bienvenido'}">Bienvenido</p>
    </div>
    <div class="dash-actions">
        <a href="/oferente/habilidades" class="btn btn-primary">Mis habilidades</a>
        <a href="/oferente/mi-cv" class="btn btn-outline">Mi CV</a>
        <a href="/puestos/buscar-por-caracteristicas" class="btn btn-outline">Explorar puestos</a>
    </div>
    <div class="notice-box" style="margin-top:22px;">
        <h4>&#128204; Guía rápida</h4>
        <p>
            Registre sus habilidades técnicas desde <strong>Mis habilidades</strong> y suba su
            curriculum vitae desde <strong>Mi CV</strong>. Cuantas más habilidades registre,
            mayor será su porcentaje de coincidencia con los puestos disponibles.
        </p>
    </div>
</div>
</body>
</html>
