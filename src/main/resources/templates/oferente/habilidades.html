<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.thymeleaf.org" lang="es">
<head><title>Mis Habilidades</title></head>
<body>
<div layout:fragment="content">
    <div class="habilidades-layout">

        
        <div class="habil-panel">
            <h3>Mis habilidades</h3>
            <table th:if="${habilidades != null and not #lists.isEmpty(habilidades)}">
                <thead>
                    <tr>
                        <th>Característica</th>
                        <th>Nivel</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="hab : ${habilidades}">
                        <td th:text="${hab.caracteristica.nombre}"></td>
                        <td th:text="${hab.nivel}"></td>
                    </tr>
                </tbody>
            </table>
            <p th:if="${habilidades == null or #lists.isEmpty(habilidades)}"
               style="color:#6c757d;font-size:13px;">Sin habilidades registradas.</p>
        </div>

        
        <div class="nav-panel">
            <div class="ruta-top">Ruta:</div>
            <div class="ruta-chips">
                <a href="/oferente/habilidades" class="chip-a">Raíces</a>
                <th:block th:if="${categoriaActual != null}">
                    <span class="ruta-sep">/</span>
                    <span class="chip" th:text="${categoriaActual.nombre}"></span>
                </th:block>
            </div>

            <p class="sub-title" th:if="${categoriaActual != null}"
               th:text="'Subcategorías de: ' + ${categoriaActual.nombre}"></p>
            <p class="sub-title" th:unless="${categoriaActual != null}">Categorías raíces</p>

            <div th:if="${categorias != null}" th:each="cat : ${categorias}" class="nav-row">
                <span th:text="${cat.nombre}">Categoría</span>
                
                <th:block th:if="${cat.hijos != null and not #lists.isEmpty(cat.hijos)}">
                    <a th:href="@{'/oferente/habilidades?actualId=' + ${cat.idCaracteristica}}"
                       class="btn btn-sm btn-secondary">Entrar</a>
                </th:block>
                <th:block th:unless="${cat.hijos != null and not #lists.isEmpty(cat.hijos)}">
                    <a th:href="@{'/oferente/habilidades?actualId=' + ${cat.idCaracteristica}}"
                       class="btn btn-sm btn-secondary">Entrar</a>
                </th:block>
            </div>
            <p th:if="${categorias == null or #lists.isEmpty(categorias)}"
               style="color:#6c757d;font-size:12px;">Sin subcategorías.</p>
        </div>

        
        <div class="agregar-panel">
            <h3>Agregar Habilidad</h3>
            <form method="post" action="/oferente/agregar-habilidad">
                <div class="form-group">
                    <label class="form-label">Característica</label>
                    <select name="idCaracteristica" class="form-select" required>
                        <option value="">Selecciona...</option>
                        <option th:each="car : ${todas}"
                                th:value="${car.idCaracteristica}"
                                th:text="${car.nombre}">
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Nivel (1-5)</label>
                    <input type="number" name="nivel" class="form-control"
                           min="1" max="5" value="3" required/>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Agregar</button>
            </form>
        </div>

    </div>
</div>
</body>
</html>
