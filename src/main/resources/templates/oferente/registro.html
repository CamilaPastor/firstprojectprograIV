<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro de Candidato</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container form-container">
        <div class="form-box">
            <h2>Registro de Candidato</h2>
            
            <div th:if="${error}" class="error-message" th:text="${error}"></div>
            
            <form th:action="@{/oferente/registro}" th:object="${oferente}" method="post" class="form">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" th:field="*{nombre}" required>
                </div>
                
                <div class="form-group">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" th:field="*{apellido}" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" th:field="*{email}" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" th:field="*{password}" required>
                </div>
                
                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" th:field="*{telefono}">
                </div>
                
                <div class="form-group">
                    <label for="profesion">Profesión</label>
                    <input type="text" id="profesion" th:field="*{profesion}">
                </div>
                
                <div class="form-group">
                    <label for="experienciaAnios">Años de Experiencia</label>
                    <input type="number" id="experienciaAnios" th:field="*{experienciaAnios}">
                </div>
                
                <div class="form-group">
                    <label for="ciudad">Ciudad</label>
                    <input type="text" id="ciudad" th:field="*{ciudad}">
                </div>
                
                <div class="form-group">
                    <label for="resumenProfesional">Resumen Profesional</label>
                    <textarea id="resumenProfesional" th:field="*{resumenProfesional}" rows="4"></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary">Registrarse</button>
                <p class="form-link">¿Ya tienes cuenta? <a href="/oferente/login">Inicia sesión aquí</a></p>
            </form>
        </div>
    </div>
</body>
</html>
