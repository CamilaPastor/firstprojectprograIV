<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org" lang="es">
<head><title>Empresa - Dashboard</title></head>
<body>
    <div layout:fragment="content">
        <div class="container">
            <div class="page-header">
                <h1>&#127970; Panel de Empresa</h1>
                <p>Administra tus puestos y busca los mejores candidatos</p>
            </div>

            <div class="stats-grid">
                <a href="/empresa/mis-puestos" class="stat-card" style="text-decoration: none;">
                    <div class="stat-icon">&#128203;</div>
                    <div class="stat-label">Mis puestos</div>
                    <p class="text-small text-muted mt-1">Ver todos los puestos publicados</p>
                </a>
                <a href="/empresa/nuevo-puesto" class="stat-card" style="text-decoration: none;">
                    <div class="stat-icon">&#10133;</div>
                    <div class="stat-label">Publicar puesto</div>
                    <p class="text-small text-muted mt-1">Crear una nueva vacante</p>
                </a>
                <a href="/puestos/buscar-por-caracteristicas" class="stat-card" style="text-decoration: none;">
                    <div class="stat-icon">&#128269;</div>
                    <div class="stat-label">Buscar puestos</div>
                    <p class="text-small text-muted mt-1">Explorar puestos del mercado</p>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
