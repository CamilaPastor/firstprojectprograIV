<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.thymeleaf.org" lang="es">
<head><title>Candidatos</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header">
        <h1 class="candidatos-title">&#128203; Candidatos para el puesto</h1>
        <p class="candidatos-puesto" th:if="${puesto != null}" th:text="${puesto.descripcion}"></p>
    </div>

    <div class="table-wrap" th:if="${candidatos != null and not #lists.isEmpty(candidatos)}">
        <table>
            <thead>
                <tr>
                    <th>Candidato</th>
                    <th>Correo</th>
                    <th>Requisitos cumplidos</th>
                    <th>% Coincidencia</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="candidato : ${candidatos}">
                    <td th:text="${candidato.oferente.nombre + ' ' + candidato.oferente.apellido}"></td>
                    <td th:text="${candidato.oferente.correo}"></td>
                    <td th:text="${candidato.cumplidos + ' / ' + candidato.total}"></td>
                    <td>
                        <strong th:text="${#numbers.formatDecimal(candidato.porcentaje, 0, 'COMMA', 1, 'POINT') + '%'}"></strong>
                    </td>
                    <td>
                        <a th:href="@{'/empresa/detalle-candidato/' + ${candidato.oferente.idOferente}}"
                           class="btn btn-primary btn-sm">Ver perfil</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <p th:if="${candidatos == null or #lists.isEmpty(candidatos)}"
       style="font-size:13px;color:#6c757d;padding:18px;background:#fff;border:1px solid #c8d0da;border-radius:4px;">
        No hay candidatos disponibles para este puesto.
    </p>

    <div style="margin-top:16px;">
        <a href="/empresa/mis-puestos" class="btn btn-secondary">&#8592; Volver a mis puestos</a>
    </div>
</div>
</body>
</html>
