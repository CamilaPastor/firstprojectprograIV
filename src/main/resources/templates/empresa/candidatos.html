<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org" lang="es">
<head><title>Empresa - Candidatos</title></head>
<body>
    <div layout:fragment="content">
        <div class="container">
            <div class="page-header">
                <h1>&#128101; Candidatos compatibles</h1>
                <p th:if="${puesto != null}">
                    Para el puesto: <strong th:text="${puesto.descripcion}" style="color: var(--gray-900);"></strong>
                </p>
            </div>

            <div th:if="${candidatos != null && !candidatos.isEmpty()}" class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Oferente</th>
                            <th>Requisitos cumplidos</th>
                            <th>Coincidencia</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="rc : ${candidatos}">
                            <td style="font-weight: 600;" th:text="${rc.oferente.nombre + ' ' + rc.oferente.apellido}"></td>
                            <td>
                                <span th:text="${rc.cumplidos + ' / ' + rc.total}"></span>
                            </td>
                            <td>
                                <div style="display: flex; align-items: center; gap: 0.5rem;">
                                    <div class="percent-bar" style="width: 80px;">
                                        <div class="percent-bar-fill" th:style="'width:' + ${rc.porcentaje} + '%'"></div>
                                    </div>
                                    <span class="font-bold" th:text="${#numbers.formatDecimal(rc.porcentaje, 0, 'COMMA', 1, 'POINT') + '%'}"></span>
                                </div>
                            </td>
                            <td>
                                <a th:href="@{'/empresa/detalle-candidato/' + ${rc.oferente.idOferente}}" class="btn btn-primary btn-sm">Ver detalle</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${candidatos == null || candidatos.isEmpty()}" class="empty-state">
                <div class="empty-icon">&#128100;</div>
                <p>No se encontraron candidatos que coincidan con los requisitos.</p>
            </div>

            <a href="/empresa/mis-puestos" class="btn btn-secondary mt-2">&#8592; Volver a mis puestos</a>
        </div>
    </div>
</body>
</html>
