<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Perfil Empresa</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h2>Perfil de Empresa</h2>
        
        <form th:action="@{/empresa/actualizar}" th:object="${empresa}" method="post" class="form">
            <input type="hidden" th:field="*{empresaId}">
            
            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" th:field="*{nombre}">
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" th:field="*{email}">
            </div>
            
            <div class="form-group">
                <label for="razonSocial">Razón Social</label>
                <input type="text" id="razonSocial" th:field="*{razonSocial}">
            </div>
            
            <div class="form-group">
                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" th:field="*{telefono}">
            </div>
            
            <div class="form-group">
                <label for="ciudad">Ciudad</label>
                <input type="text" id="ciudad" th:field="*{ciudad}">
            </div>
            
            <div class="form-group">
                <label for="sitioWeb">Sitio Web</label>
                <input type="url" id="sitioWeb" th:field="*{sitioWeb}">
            </div>
            
            <div class="form-group">
                <label for="descripcion">Descripción</label>
                <textarea id="descripcion" th:field="*{descripcion}" rows="6"></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary">Actualizar</button>
            <a th:href="@{/empresa/dashboard(id=${empresa.empresaId})}" class="btn btn-secondary">Volver</a>
        </form>
    </div>
</body>
</html>
