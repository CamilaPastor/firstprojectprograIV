<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.thymeleaf.org" lang="es">
<head>
    <title>Mis Puestos - Bolsa de Empleo</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container">
            <!-- Mensajes -->
            <div th:if="${success}" class="alert alert-success">
                <span th:text="${success}"></span>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1>Mis Puestos de Trabajo</h1>
                <a href="/empresa/nuevo-puesto" class="btn btn-primary">+ Nuevo Puesto</a>
            </div>

            <div th:if="${puestos != null and !puestos.isEmpty()}" class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Descripción</th>
                            <th>Salario</th>
                            <th>Tipo</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="puesto : ${puestos}">
                            <td th:text="${puesto.idPuesto}"></td>
                            <td>
                                <div th:text="${puesto.descripcion.length() > 50 ? puesto.descripcion.substring(0, 50) + '...' : puesto.descripcion}"></div>
                            </td>
                            <td th:text="${puesto.salario != null ? '₡ ' + #numbers.formatDecimal(puesto.salario, 0, 'COMMA', 0, 'POINT') : 'A convenir'}"></td>
                            <td>
                                <span th:class="'badge ' + (${puesto.tipoPublicacion == 'publico' ? 'badge-green' : 'badge-gray'})"
                                      th:text="${puesto.tipoPublicacion == 'publico' ? 'Público' : 'Privado'}"></span>
                            </td>
                            <td>
                                <span th:class="'badge ' + (${puesto.activo ? 'badge-green' : 'badge-orange'})"
                                      th:text="${puesto.activo ? 'Activo' : 'Inactivo'}"></span>
                            </td>
                            <td>
                                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                                    <a th:href="@{'/empresa/buscar-candidatos?idPuesto=' + ${puesto.idPuesto}}" class="btn btn-primary btn-sm">Candidatos</a>
                                    <form method="post" action="/empresa/desactivar" style="display: inline;">
                                        <input type="hidden" name="idPuesto" th:value="${puesto.idPuesto}" />
                                        <button type="submit" class="btn btn-danger btn-sm"
                                                th:if="${puesto.activo}"
                                                onclick="return confirm('¿Estás seguro de desactivar este puesto?')">Desactivar</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${puestos == null or puestos.isEmpty()}" class="text-center" style="padding: 3rem;">
                <h3>No tienes puestos publicados</h3>
                <p>Publica tu primer puesto de trabajo para empezar a recibir candidatos.</p>
                <a href="/empresa/nuevo-puesto" class="btn btn-primary">Publicar Primer Puesto</a>
            </div>
        </div>
    </div>
</body>
</html>
