<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org" lang="es">
<head><title>Empresa - Mis puestos</title></head>
<body>
    <div layout:fragment="content">
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
                <div class="page-header" style="margin-bottom: 0;">
                    <h1>&#128203; Mis puestos</h1>
                    <p>Gestiona tus vacantes publicadas</p>
                </div>
                <a href="/empresa/nuevo-puesto" class="btn btn-primary">&#10133; Publicar puesto</a>
            </div>

            <div th:if="${success}" class="alert alert-success">
                <span th:text="${success}"></span>
            </div>
            <div th:if="${error}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>

            <div th:if="${puestos != null && !puestos.isEmpty()}" class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Descripcion</th>
                            <th>Salario</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="puesto : ${puestos}">
                            <td th:text="${puesto.idPuesto}"></td>
                            <td th:text="${puesto.descripcion}" style="font-weight: 600;"></td>
                            <td>
                                <span th:if="${puesto.salario != null}" th:text="'&#8353; ' + ${#numbers.formatDecimal(puesto.salario, 0, 'COMMA', 2, 'POINT')}"></span>
                                <span th:if="${puesto.salario == null}" class="text-muted">N/A</span>
                            </td>
                            <td>
                                <span th:if="${puesto.activo}" class="badge badge-success">Activo</span>
                                <span th:unless="${puesto.activo}" class="badge badge-danger">Inactivo</span>
                            </td>
                            <td>
                                <div class="actions-row">
                                    <form th:if="${puesto.activo}" method="post" action="/empresa/desactivar" class="inline">
                                        <input type="hidden" name="idPuesto" th:value="${puesto.idPuesto}" />
                                        <button type="submit" class="btn btn-warning btn-sm">Desactivar</button>
                                    </form>
                                    <a th:href="@{'/empresa/buscar-candidatos?idPuesto=' + ${puesto.idPuesto}}" class="btn btn-accent btn-sm">Buscar candidatos</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${puestos == null || puestos.isEmpty()}" class="empty-state">
                <div class="empty-icon">&#128194;</div>
                <p>No tienes puestos registrados aun.</p>
                <a href="/empresa/nuevo-puesto" class="btn btn-primary mt-2">Publicar tu primer puesto</a>
            </div>
        </div>
    </div>
</body>
</html>
