<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.thymeleaf.org" lang="es">
<head><title>Mis Puestos</title></head>
<body>
<div layout:fragment="content">
    <div class="section-header">
        <h1>Mis puestos publicados</h1>
        <a href="/empresa/nuevo-puesto" class="btn btn-success">&#43; Publicar puesto</a>
    </div>

    <div class="table-wrap" th:if="${puestos != null and not #lists.isEmpty(puestos)}">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Descripción</th>
                    <th>Salario</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="puesto : ${puestos}">
                    <td th:text="${puesto.idPuesto}"></td>
                    <td th:text="${puesto.descripcion}"></td>
                    <td>
                        <span th:if="${puesto.salario != null}"
                              th:text="'₡ ' + ${#numbers.formatDecimal(puesto.salario,1,'COMMA',2,'POINT')}"></span>
                        <span th:unless="${puesto.salario != null}" style="color:#6c757d;">A convenir</span>
                    </td>
                    <td>
                        <span class="badge badge-on"  th:if="${puesto.activo}">Activo</span>
                        <span class="badge badge-off" th:unless="${puesto.activo}">Inactivo</span>
                    </td>
                    <td>
                        <div class="td-actions">
                            <a th:href="@{'/empresa/buscar-candidatos?idPuesto=' + ${puesto.idPuesto}}"
                               class="btn btn-primary btn-sm">Ver candidatos</a>
                            <form th:if="${puesto.activo}" method="post" action="/empresa/desactivar" style="display:inline;">
                                <input type="hidden" name="idPuesto" th:value="${puesto.idPuesto}"/>
                                <button type="submit" class="btn btn-danger btn-sm">Desactivar</button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <p th:if="${puestos == null or #lists.isEmpty(puestos)}"
       style="font-size:13px;color:#6c757d;padding:18px;background:#fff;border:1px solid #c8d0da;border-radius:4px;">
        No has publicado ningún puesto todavía.
        <a href="/empresa/nuevo-puesto">Publicar primer puesto</a>
    </p>
</div>
</body>
</html>
