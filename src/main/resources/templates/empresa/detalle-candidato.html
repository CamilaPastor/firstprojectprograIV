<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.thymeleaf.org" lang="es">
<head><title>Detalle Candidato</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header">
        <h1>&#128100; Perfil del candidato</h1>
        <p th:text="${oferente.nombre + ' ' + oferente.apellido}"></p>
    </div>

    <div class="detalle-box">
        <h2>Información personal</h2>
        <div class="detalle-row"><strong>Identificación:</strong> <span th:text="${oferente.identificacion}"></span></div>
        <div class="detalle-row"><strong>Correo:</strong> <span th:text="${oferente.correo}"></span></div>
        <div class="detalle-row"><strong>Teléfono:</strong> <span th:text="${oferente.telefono != null ? oferente.telefono : '—'}"></span></div>
        <div class="detalle-row"><strong>Residencia:</strong> <span th:text="${oferente.residencia != null ? oferente.residencia : '—'}"></span></div>
        <div class="detalle-row"><strong>Nacionalidad:</strong> <span th:text="${oferente.nacionalidad != null ? oferente.nacionalidad : '—'}"></span></div>
    </div>

    <h3 class="habilidades-title">Habilidades registradas</h3>
    <div class="table-wrap" th:if="${habilidades != null and not #lists.isEmpty(habilidades)}" style="margin-top:10px;">
        <table>
            <thead>
                <tr>
                    <th>Habilidad / Característica</th>
                    <th>Nivel (1–5)</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="hab : ${habilidades}">
                    <td th:text="${hab.caracteristica.nombre}"></td>
                    <td th:text="${hab.nivel}"></td>
                </tr>
            </tbody>
        </table>
    </div>
    <p th:if="${habilidades == null or #lists.isEmpty(habilidades)}"
       style="font-size:13px;color:#6c757d;padding:14px;background:#fff;border:1px solid #c8d0da;border-radius:4px;margin-top:10px;">
        Este candidato no tiene habilidades registradas.
    </p>

    <div style="margin-top:20px;display:flex;gap:10px;">
        <a th:if="${tieneCv}" th:href="@{'/empresa/descargar-cv/' + ${oferente.idOferente}}"
           class="btn btn-success">&#128196; Descargar CV</a>
        <a href="/empresa/mis-puestos" class="btn btn-secondary">&#8592; Volver</a>
    </div>
</div>
</body>
</html>
