<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org" lang="es">
<head><title>Publicar puesto</title></head>
<body>
    <div layout:fragment="content">
        <div class="container" style="max-width: 720px; margin: 0 auto;">
            <div class="page-header">
                <h1>&#10133; Publicar nuevo puesto</h1>
                <p>Define los requisitos y encuentra al candidato ideal</p>
            </div>

            <div th:if="${error}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>

            <div class="card" style="padding: 2rem;">
                <form method="post" action="/empresa/nuevo-puesto">
                    <div class="form-group">
                        <label class="form-label">Descripcion del puesto *</label>
                        <textarea name="descripcion" class="form-control" rows="3" required placeholder="Ej: Desarrollador Java Sr. con experiencia en Spring Boot"></textarea>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label class="form-label">Salario ofrecido (colones)</label>
                            <input type="number" name="salario" class="form-control" step="0.01" placeholder="Ej: 1500000" />
                        </div>
                        <div class="form-group">
                            <label class="form-label">Tipo de publicacion</label>
                            <select name="tipoPublicacion" class="form-control">
                                <option value="publico">Publico</option>
                                <option value="privado">Privado</option>
                            </select>
                        </div>
                    </div>

                    <hr style="border: none; border-top: 1px solid var(--gray-200); margin: 1.5rem 0;" />

                    <h3 style="margin-bottom: 0.5rem;">Caracteristicas requeridas</h3>
                    <p class="text-muted text-small mb-2">Selecciona las habilidades y su nivel requerido (1 = basico, 5 = experto).</p>

                    <div th:each="categoria : ${categorias}" style="margin-bottom: 1.25rem;">
                        <h4 th:text="${categoria.nombre}" style="color: var(--gray-700); margin-bottom: 0.5rem; font-size: 0.95rem;"></h4>
                        <div th:if="${categoria.hijos != null && !categoria.hijos.isEmpty()}" style="padding-left: 0.5rem;">
                            <div th:each="sub : ${categoria.hijos}" style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; padding: 0.4rem 0.6rem; border-radius: var(--radius-sm); transition: background 0.15s;">
                                <input type="checkbox" name="caracteristicas" th:value="${sub.idCaracteristica}" style="width: 18px; height: 18px; cursor: pointer;" />
                                <span th:text="${sub.nombre}" style="flex: 1; font-size: 0.9rem;"></span>
                                <label class="text-small text-muted" style="white-space: nowrap;">Nivel:</label>
                                <select th:name="'nivel_' + ${sub.idCaracteristica}" class="form-control" style="width: 65px; padding: 0.3rem 0.5rem; font-size: 0.85rem;">
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3" selected>3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block btn-lg mt-2">Publicar puesto</button>
                </form>
            </div>

            <a href="/empresa/mis-puestos" class="btn btn-secondary mt-1">&#8592; Volver a mis puestos</a>
        </div>
    </div>
</body>
</html>
