<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.thymeleaf.org" lang="es">
<head><title>Nuevo Puesto</title></head>
<body>
<div layout:fragment="content">
    <div class="puesto-form-wrap">
        <div class="page-header" style="margin-bottom:20px;">
            <h1>&#128203; Publicar nuevo puesto</h1>
            <p>Complete la información del puesto y seleccione las habilidades requeridas.</p>
        </div>
        <form method="post" action="/empresa/nuevo-puesto">
            <div class="form-group">
                <label class="form-label">Descripción del puesto</label>
                <textarea name="descripcion" class="form-control" rows="3" required placeholder="Descripción del puesto"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">Salario</label>
                <input type="number" name="salario" class="form-control" step="0.01" placeholder="Salario en colones"/>
            </div>
            <div class="form-group">
                <label class="form-label">Tipo de Publicación</label>
                <div>
                    <label style="display:inline-block;margin-right:20px;">
                        <input type="radio" name="tipoPublicacion" value="publico" checked/> Público
                    </label>
                    <label style="display:inline-block;">
                        <input type="radio" name="tipoPublicacion" value="privado"/> Privado
                    </label>
                </div>
            </div>

            <h3 style="margin-top:20px;margin-bottom:10px;">Características requeridas</h3>
            <div class="car-select-box">
                <th:block th:each="cat : ${categorias}">
                    <div class="car-select-row" th:if="${cat.hijos == null or #lists.isEmpty(cat.hijos)}">
                        <input type="checkbox" th:id="'car_' + ${cat.idCaracteristica}" name="caracteristicas" th:value="${cat.idCaracteristica}"/>
                        <label th:for="'car_' + ${cat.idCaracteristica}" th:text="${cat.nombre}" style="flex:1;"></label>
                        <input type="number" th:name="'nivel_' + ${cat.idCaracteristica}" class="nivel-input" value="3" min="1" max="5"/>
                    </div>
                    <th:block th:if="${cat.hijos != null and not #lists.isEmpty(cat.hijos)}">
                        <div class="car-select-row"><strong th:text="${cat.nombre}"></strong></div>
                        <th:block th:each="sub : ${cat.hijos}">
                            <div class="car-select-row sub" th:if="${sub.hijos == null or #lists.isEmpty(sub.hijos)}">
                                <input type="checkbox" th:id="'car_' + ${sub.idCaracteristica}" name="caracteristicas" th:value="${sub.idCaracteristica}"/>
                                <label th:for="'car_' + ${sub.idCaracteristica}" th:text="${sub.nombre}" style="flex:1;"></label>
                                <input type="number" th:name="'nivel_' + ${sub.idCaracteristica}" class="nivel-input" value="3" min="1" max="5"/>
                            </div>
                            <th:block th:if="${sub.hijos != null and not #lists.isEmpty(sub.hijos)}">
                                <div class="car-select-row sub"><strong th:text="${sub.nombre}"></strong></div>
                                <div class="car-select-row subsub" th:each="subsub : ${sub.hijos}">
                                    <input type="checkbox" th:id="'car_' + ${subsub.idCaracteristica}" name="caracteristicas" th:value="${subsub.idCaracteristica}"/>
                                    <label th:for="'car_' + ${subsub.idCaracteristica}" th:text="${subsub.nombre}" style="flex:1;"></label>
                                    <input type="number" th:name="'nivel_' + ${subsub.idCaracteristica}" class="nivel-input" value="3" min="1" max="5"/>
                                </div>
                            </th:block>
                        </th:block>
                    </th:block>
                </th:block>
            </div>

            <div style="margin-top:16px;">
                <button type="submit" class="btn btn-primary">Publicar</button>
                <a href="/empresa/mis-puestos" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
