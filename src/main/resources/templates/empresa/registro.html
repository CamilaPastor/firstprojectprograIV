<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro de Empresa</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container form-container">
        <div class="form-box">
            <h2>Registro de Empresa</h2>
            
            <div th:if="${error}" class="error-message" th:text="${error}"></div>
            
            <form th:action="@{/empresa/registro}" th:object="${empresa}" method="post" class="form">
                <div class="form-group">
                    <label for="nombre">Nombre de la Empresa</label>
                    <input type="text" id="nombre" th:field="*{nombre}" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" th:field="*{email}" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" th:field="*{password}" required>
                </div>
                
                <div class="form-group">
                    <label for="razonSocial">Razón Social</label>
                    <input type="text" id="razonSocial" th:field="*{razonSocial}">
                </div>
                
                <div class="form-group">
                    <label for="rfc">RFC</label>
                    <input type="text" id="rfc" th:field="*{rfc}" required>
                </div>
                
                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" th:field="*{telefono}">
                </div>
                
                <div class="form-group">
                    <label for="ciudad">Ciudad</label>
                    <input type="text" id="ciudad" th:field="*{ciudad}">
                </div>
                
                <div class="form-group">
                    <label for="estado">Estado</label>
                    <input type="text" id="estado" th:field="*{estado}">
                </div>
                
                <div class="form-group">
                    <label for="sitioWeb">Sitio Web</label>
                    <input type="url" id="sitioWeb" th:field="*{sitioWeb}">
                </div>
                
                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" th:field="*{descripcion}" rows="4"></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary">Registrarse</button>
                <p class="form-link">¿Ya tienes cuenta? <a href="/empresa/login">Inicia sesión aquí</a></p>
            </form>
        </div>
    </div>
</body>
</html>
