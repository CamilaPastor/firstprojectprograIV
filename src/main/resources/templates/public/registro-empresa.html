<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.thymeleaf.org" lang="es">
<head>
    <title>Registro Empresa - Bolsa de Empleo</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container" style="max-width: 600px; margin: 2rem auto;">
            <!-- Mensajes -->
            <div th:if="${error}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>

            <!-- Card de Registro -->
            <div class="card" style="padding: 2rem;">
                <h2 class="text-center mb-4">Registro de Empresa</h2>

                <form method="post" action="/registro/empresa">
                    <!-- Nombre -->
                    <div class="form-group">
                        <label class="form-label">Nombre de la Empresa *</label>
                        <input type="text" name="nombre" class="form-control" required
                               placeholder="Nombre completo de la empresa" />
                    </div>

                    <!-- Localización -->
                    <div class="form-group">
                        <label class="form-label">Localización</label>
                        <input type="text" name="localizacion" class="form-control"
                               placeholder="Ciudad, Provincia, País" />
                    </div>

                    <!-- Correo -->
                    <div class="form-group">
                        <label class="form-label">Correo Electrónico *</label>
                        <input type="email" name="correo" class="form-control" required
                               placeholder="contacto@empresa.com" />
                    </div>

                    <!-- Teléfono -->
                    <div class="form-group">
                        <label class="form-label">Teléfono</label>
                        <input type="tel" name="telefono" class="form-control"
                               placeholder="+506 2222-3333" />
                    </div>

                    <!-- Descripción -->
                    <div class="form-group">
                        <label class="form-label">Descripción</label>
                        <textarea name="descripcion" class="form-control" rows="4"
                                  placeholder="Describe brevemente tu empresa y su actividad"></textarea>
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label class="form-label">Contraseña *</label>
                        <input type="password" name="password" class="form-control" required
                               placeholder="Mínimo 6 caracteres" />
                    </div>

                    <!-- Botón -->
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Registrar Empresa</button>
                </form>

                <!-- Link a login -->
                <div class="text-center mt-4">
                    <p>¿Ya tienes cuenta? <a href="/login">Inicia sesión</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
