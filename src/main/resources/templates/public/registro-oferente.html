<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.thymeleaf.org" lang="es">
<head><title>Registro Oferente</title></head>
<body>
<div layout:fragment="content">
    <div class="registro-card">
        <div class="registro-header">&#128100; Registro de Oferente</div>
        <div class="registro-body">
            <form method="post" action="/registro/oferente">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Número de identificación</label>
                        <input type="text" name="identificacion" class="form-control" required placeholder="Ej: 123456789"/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nacionalidad</label>
                        <input type="text" name="nacionalidad" class="form-control" placeholder="Costarricense"/>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Nombre</label>
                        <input type="text" name="nombre" class="form-control" required placeholder="Tu nombre"/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Apellido</label>
                        <input type="text" name="apellido" class="form-control" required placeholder="Tu apellido"/>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" name="correo" class="form-control" required placeholder="tu@email.com"/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Teléfono</label>
                        <input type="tel" name="telefono" class="form-control" placeholder="+506 8888-9999"/>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Residencia</label>
                    <input type="text" name="residencia" class="form-control" placeholder="San José, Heredia…"/>
                </div>
                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" required placeholder="Mínimo 6 caracteres"/>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Solicitar registro</button>
            </form>
        </div>
        <div class="registro-footer">
            Su solicitud quedará pendiente de aprobación por el administrador. &nbsp;
            ¿Ya tiene cuenta? <a href="/login">Inicie sesión aquí</a>
        </div>
    </div>
</div>
</body>
</html>
