<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org" lang="es">
<head><title>Buscar puestos</title></head>
<body>
    <div layout:fragment="content">
        <div class="container">
            <div class="page-header">
                <h1>&#128269; Buscar puestos por caracteristicas</h1>
                <p>Selecciona las habilidades que buscas y encuentra puestos compatibles</p>
            </div>

            <div class="card" style="padding: 2rem; margin-bottom: 2rem;">
                <form method="get" action="/puestos/buscar-por-caracteristicas">
                    <div th:each="categoria : ${categorias}" style="margin-bottom: 1.25rem;">
                        <h4 th:text="${categoria.nombre}" style="margin-bottom: 0.5rem; color: var(--gray-700);"></h4>
                        <div th:if="${categoria.hijos != null && !categoria.hijos.isEmpty()}" style="padding-left: 1rem; display: flex; flex-wrap: wrap; gap: 0.75rem;">
                            <label th:each="sub : ${categoria.hijos}" class="checkbox-item" style="cursor: pointer;">
                                <input type="checkbox" name="ids" th:value="${sub.idCaracteristica}" />
                                <span th:text="${sub.nombre}"></span>
                            </label>
                        </div>
                    </div>

                    <div class="actions-row mt-2">
                        <button type="submit" class="btn btn-primary">Buscar</button>
                        <a href="/puestos/buscar-por-caracteristicas" class="btn btn-secondary">Limpiar filtros</a>
                    </div>
                </form>
            </div>

            <!-- Results -->
            <div th:if="${puestos != null}">
                <h3 class="mb-2">Resultados</h3>
                <div th:if="${puestos.isEmpty()}" class="empty-state">
                    <div class="empty-icon">&#128269;</div>
                    <p>No se encontraron puestos que coincidan con los filtros seleccionados.</p>
                </div>
                <div th:if="${!puestos.isEmpty()}" class="features-grid">
                    <div th:each="puesto : ${puestos}" class="card">
                        <span class="badge badge-primary mb-1" th:text="${puesto.empresa.nombre}">Empresa</span>
                        <h4 th:text="${puesto.descripcion}" style="margin-bottom: 0.5rem;">Puesto</h4>
                        <p th:if="${puesto.salario != null}" style="color: #16a34a; font-weight: 600;">
                            &#8353; <span th:text="${#numbers.formatDecimal(puesto.salario, 0, 'COMMA', 2, 'POINT')}"></span>
                        </p>
                        <p th:if="${puesto.salario == null}" class="text-muted text-small">Salario no especificado</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
