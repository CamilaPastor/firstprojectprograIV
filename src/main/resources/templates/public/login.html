<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org" lang="es">
<head><title>Iniciar sesion</title></head>
<body>
    <div layout:fragment="content">
        <div class="auth-wrapper">
            <div th:if="${error}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>
            <div th:if="${success}" class="alert alert-success">
                <span th:text="${success}"></span>
            </div>

            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-icon">&#128274;</div>
                    <h2>Iniciar sesion</h2>
                    <p>Ingresa tus credenciales para acceder</p>
                </div>

                <form method="post" action="/login">
                    <div class="form-group">
                        <label class="form-label">Tipo de usuario</label>
                        <div class="radio-group">
                            <label><input type="radio" name="tipo" value="empresa" checked /><span>Empresa</span></label>
                            <label><input type="radio" name="tipo" value="oferente" /><span>Oferente</span></label>
                            <label><input type="radio" name="tipo" value="admin" /><span>Admin</span></label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Usuario</label>
                        <input type="text" name="usuario" class="form-control" required
                               placeholder="Correo electronico o identificacion" />
                    </div>

                    <div class="form-group">
                        <label class="form-label">Contrasena</label>
                        <input type="password" name="password" class="form-control" required
                               placeholder="Tu contrasena" />
                    </div>

                    <button type="submit" class="btn btn-primary btn-block btn-lg">Entrar</button>
                </form>

                <div class="auth-footer">
                    No tienes cuenta?
                    <a href="/registro/empresa">Registrate como empresa</a> o
                    <a href="/registro/oferente">como oferente</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
