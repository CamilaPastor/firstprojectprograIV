server.port=8081
# ================================================================
#  Bolsa de Empleo - application.properties
# ================================================================
#Git Funciona?
# Base de datos PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/bolsa_empleo
spring.datasource.username=bolsa_user
spring.datasource.password=bolsa1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# Subida de archivos (CV en PDF)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Logging
logging.level.cr.una.bolsaempleo=DEBUG
