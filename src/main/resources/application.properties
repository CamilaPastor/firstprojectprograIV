# ================================================================
#  application.properties - configurado para Docker
#  Archivo: src/main/resources/application.properties
# ================================================================

# Puerto
server.port=8080

# Base de datos - conexion a MySQL en Docker
# En Docker el host es "mysql" (nombre del contenedor)
# Para desarrollo local sin Docker cambia "mysql" por "localhost"
spring.datasource.url=jdbc:mysql://localhost:3306/bolsa_empleo
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# Subida de archivos (CV en PDF)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
